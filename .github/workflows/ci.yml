name: CI

# Gate every pull request: typecheck + red-line tests + production build
# must pass before merge. The test step is the CEO 上线门 ④ gate — the
# red-line suite (src/core/redline.test.ts ①②③) must stay green.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:run
      - run: npm run build
